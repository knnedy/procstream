version: 2

project_name: procstream

before:
  hooks:
    - sh -c "cd web && pnpm install && pnpm run build"
    - rm -rf cmd/procstream/out
    - cp -r web/out cmd/procstream/out

builds:
  - id: procstream
    main: ./cmd/procstream
    binary: procstream
    ldflags:
      - -s -w -X main.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: procstream
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - preview.png

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"
  groups:
    - title: Features
      regexp: "^feat"
    - title: Bug Fixes
      regexp: "^fix"

release:
  github:
    owner: knnedy
    name: procstream
  draft: false
  prerelease: auto
  name_template: "ProcStream {{.Version}}"
